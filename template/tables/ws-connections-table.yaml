  WsConnectionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Join ['-', [ws-connections-table, !Ref AWS::StackName]]
      AttributeDefinitions:
        - AttributeName: connectionId
          AttributeType: S
        - AttributeName: audience
          AttributeType: S
      KeySchema:
        - AttributeName: connectionId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: audience-index
          KeySchema:
            - AttributeName: audience
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Env
          Value: !Ref AWS::StackName
        - Key: Label
          Value: "koekalenteri"
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: false
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true
