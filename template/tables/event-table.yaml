  EventTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Join ['-', [event-table, 'v3', !Ref AWS::StackName]]
      KeySchema:
          - AttributeName: id
            KeyType: HASH
      AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
          - AttributeName: season
            AttributeType: S
          - AttributeName: startDate
            AttributeType: S
          - AttributeName: eventType
            AttributeType: S
          # TODO: remove with gsiSeasonModifiedAt after gsiSeasonUpdatedAt is deployed and consumers have migrated.
          - AttributeName: modifiedAt
            AttributeType: S
          - AttributeName: updatedAt
            AttributeType: S
          - AttributeName: entryEndDate
            AttributeType: S
      GlobalSecondaryIndexes:
        # TODO: remove after gsiSeasonUpdatedAt is deployed and consumers have migrated.
        - IndexName: gsiSeasonModifiedAt
          KeySchema:
            - AttributeName: season
              KeyType: HASH
            - AttributeName: modifiedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: gsiSeasonUpdatedAt
          KeySchema:
            - AttributeName: season
              KeyType: HASH
            - AttributeName: updatedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: gsiSeasonStartDate
          KeySchema:
            - AttributeName: season
              KeyType: HASH
            - AttributeName: startDate
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: gsiEventTypeEntryEndDate
          KeySchema:
            - AttributeName: eventType
              KeyType: HASH
            - AttributeName: entryEndDate
              KeyType: RANGE
          Projection:
            ProjectionType: INCLUDE
            NonKeyAttributes:
              - origEntryEndDate
              - entryEndDate
      Tags:
        - Key: Env
          Value: !Ref AWS::StackName
        - Key: Label
          Value: "koekalenteri"
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: false
