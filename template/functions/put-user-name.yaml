  PutUserNameFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambda/PutUserNameFunction
      Handler: handler.default
      Layers:
        - !Ref CommonLayer
      Tracing: Active
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UserTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UserLinkTable
        - CloudWatchPutMetricPolicy: {}
      Events:

        PutUserNameHttpApi:
          Type: HttpApi
          Properties:
            Path: /user/name
            Method: POST
            ApiId: !Ref KoekalenteriHttpApi
            Auth:
              Authorizer: JwtAuthorizer

  PutUserNameFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Join ['/', ['/aws/lambda', !Ref PutUserNameFunction]]
      RetentionInDays: 30
