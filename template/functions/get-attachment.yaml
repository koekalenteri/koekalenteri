  GetAttachmentFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambda/GetAttachmentFunction
      Handler: handler.default
      Layers:
        - !Ref CommonLayer
      Tracing: Active
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref EventAttachmentBucket
        - DynamoDBReadPolicy:
            TableName: !Ref UserTable
        - DynamoDBReadPolicy:
            TableName: !Ref UserLinkTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuditTable
        - CloudWatchPutMetricPolicy: {}
      Environment:
        Variables:
          BUCKET: !Ref EventAttachmentBucket
      Events:

        GetHttpApi:
          Type: HttpApi
          Properties:
            Path: /file/{key}/{name}
            Method: GET
            ApiId: !Ref KoekalenteriHttpApi

  GetAttachmentFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Join ['/', ['/aws/lambda', !Ref GetAttachmentFunction]]
      RetentionInDays: 30
