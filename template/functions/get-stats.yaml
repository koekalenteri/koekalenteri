  GetYearlyStatsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambda/GetYearlyStatsFunction
      Handler: handler.default
      Layers:
        - !Ref CommonLayer
      Tracing: Active
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref EventStatsTable
      Events:

        YearlyStatsApiHttpApi:
          Type: HttpApi
          Properties:
            Path: /yearly-stats
            Method: GET
            ApiId: !Ref KoekalenteriHttpApi

  GetYearlyStatsFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Join ['/', ['/aws/lambda', !Ref GetYearlyStatsFunction]]
      RetentionInDays: 30
