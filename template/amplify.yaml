  AmplifyRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - amplify.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: Amplify
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action: "amplify:*"
                Resource: "*"

  AmplifyApp:
    Type: "AWS::Amplify::App"
    Properties:
      Name: !Join ['-', [Koekalenteri, !Ref AWS::StackName]]
      Repository: !Ref Repository
      Description: Koekalenteri
      OauthToken: !Ref OauthToken
      EnvironmentVariables:
        - Name: REACT_APP_REGION
          Value: AWS::Region
        - Name: REACT_APP_CLIENT_ID
          Value: !GetAtt AmplifyApp.AppId
        - Name: REACT_APP_API_BASE_URL
          Value: !Sub "https://${KoekalenteriHttpApi}.execute-api.${AWS::Region}.amazonaws.com/${StageNameParam}"
        - Name: REACT_APP_WS_API_URL
          Value: !Sub "wss://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/${StageNameParam}"
        - Name: REACT_APP_OAUTH_DOMAIN
          Value: !Join ['-', !Ref AWS::StackName, !Ref CustomDomain]
        - Name: REACT_APP_REDIRECT_SIGNIN
          Value: !Join ['', 'https://', !Ref CustomDomain, '/login']
        - Name: REACT_APP_REDIRECT_SIGOUT
          Value: !Join ['', 'https://', !Ref CustomDomain, '/logout']
        - Name: REACT_APP_AUTH0_DOMAIN
          Value: !Ref Auth0Domain
        - Name: REACT_APP_AUTH0_CLIENT_ID
          Value: !Ref Auth0ClientId
        - Name: REACT_APP_AUTH0_AUDIENCE
          Value: !Ref AuthJwtAudience
        - Name: _CUSTOM_IMAGE
          Value: "node:24"
      BuildSpec: |-
        version: 0.1
        frontend:
          phases:
            build:
              commands:
                - npm ci
                - npm run build-frontend
          artifacts:
            baseDirectory: build
            files:
              - '**/*'
      CustomRules:
        - Source: "/.well-known/apple-developer-merchantid-domain-association"
          Status: "200"
          Target: "/well-known/apple-developer-merchantid-domain-association.txt"
        - Source: "</^((?!\\.(css|gif|ico|jpg|js|png|txt|svg|woff|webp|ttf|json|map)$).)*$/>"
          Status: "200"
          Target: "/index.html"
      Tags:
        - Key: Name
          Value: Koekalenteri
      IAMServiceRole: !GetAtt AmplifyRole.Arn

  AmplifyBranch:
    Type: AWS::Amplify::Branch
    Properties:
      BranchName: !Ref Branch
      AppId: !GetAtt AmplifyApp.AppId
      Description: Amplify Console main branch
      EnableAutoBuild: false
      Tags:
        - Key: Name
          Value: koekalenteri-amplify-console
        - Key: Branch
          Value: !Ref Branch
